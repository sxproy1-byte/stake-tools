<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #f5c842; --gold-dark: #c9a020;
    --bg: #0d0d0d; --card: #161616; --card2: #1e1e1e;
    --border: #2a2a2a; --text: #f0f0f0; --muted: #888;
    --green: #2ecc71; --red: #e74c3c;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 16px 40px; overflow-x: hidden; }

  /* NAVBAR */
  .navbar { width: 100vw; background: #111; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; padding: 0 16px; margin-bottom: 28px; position: sticky; top: 0; z-index: 50; }
  .navbar-inner { width: 100%; max-width: 700px; display: flex; align-items: center; gap: 6px; overflow-x: auto; padding: 10px 0; }
  .navbar-inner::-webkit-scrollbar { display: none; }
  .nav-home { font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700; color: var(--muted); text-decoration: none; padding: 7px 14px; border-radius: 10px; border: 1px solid var(--border); background: transparent; white-space: nowrap; transition: color 0.2s, border-color 0.2s; flex-shrink: 0; }
  .nav-home:hover { color: var(--gold); border-color: var(--gold-dark); }
  .nav-sep { color: #333; font-size: 18px; flex-shrink: 0; padding: 0 2px; }
  .nav-link { font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700; color: var(--muted); text-decoration: none; padding: 7px 14px; border-radius: 10px; border: 1px solid transparent; white-space: nowrap; transition: color 0.2s, border-color 0.2s, background 0.2s; flex-shrink: 0; }
  .nav-link:hover { color: var(--gold); border-color: var(--border); background: var(--card); }
  .nav-link.active { color: var(--gold); background: rgba(245,200,66,0.08); border-color: rgba(245,200,66,0.2); }

  .header { text-align: center; margin-bottom: 20px; }
  .header .logo { font-size: 13px; font-weight: 600; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
  .header h1 { font-size: 30px; font-weight: 900; color: #fff; line-height: 1.1; }
  .header .subtitle { font-size: 13px; color: var(--muted); margin-top: 6px; }

  /* FILTER PANEL */
  .filter-panel { width: 100%; max-width: 700px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 20px; }
  .filter-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .filter-title { font-size: 14px; font-weight: 700; color: var(--gold); }
  .filter-toggle { font-size: 20px; color: var(--muted); transition: transform 0.3s; }
  .filter-toggle.open { transform: rotate(180deg); }
  .filter-body { margin-top: 14px; display: none; }
  .filter-body.open { display: block; }
  .filter-actions { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn { font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
  .filter-btn.select-all { background: rgba(46,204,113,0.15); color: var(--green); border-color: rgba(46,204,113,0.3); }
  .filter-btn.select-all:hover { background: rgba(46,204,113,0.25); }
  .filter-btn.deselect-all { background: rgba(231,76,60,0.15); color: var(--red); border-color: rgba(231,76,60,0.3); }
  .filter-btn.deselect-all:hover { background: rgba(231,76,60,0.25); }
  .filter-search { width: 100%; padding: 10px 14px; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Cairo', sans-serif; font-size: 13px; margin-bottom: 12px; outline: none; }
  .filter-search:focus { border-color: var(--gold-dark); }
  .companies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; max-height: 320px; overflow-y: auto; padding: 4px; }
  .companies-grid::-webkit-scrollbar { width: 4px; }
  .companies-grid::-webkit-scrollbar-track { background: var(--card2); border-radius: 4px; }
  .companies-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .company-chip { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s; user-select: none; }
  .company-chip:hover { border-color: var(--gold-dark); }
  .company-chip.active { background: rgba(245,200,66,0.08); border-color: rgba(245,200,66,0.3); }
  .company-chip .dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; transition: all 0.2s; }
  .company-chip.active .dot { background: var(--green); border-color: var(--green); }
  .company-chip .chip-name { font-size: 12px; font-weight: 600; color: var(--muted); transition: color 0.2s; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .company-chip.active .chip-name { color: var(--text); }
  .company-chip .chip-count { font-size: 10px; color: var(--muted); margin-right: auto; flex-shrink: 0; }
  .filter-summary { margin-top: 12px; font-size: 12px; color: var(--muted); text-align: center; }
  .pinned-section { margin-bottom: 14px; }
  .pinned-label { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .pinned-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .all-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 700px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; text-align: center; }
  .stat-label { font-size: 10px; color: var(--muted); margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
  .stat-val { font-size: 24px; font-weight: 900; color: var(--gold); }

  /* BUTTONS */
  .spin-btn { display: block; width: 100%; max-width: 700px; padding: 18px; font-family: 'Cairo', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; border-radius: 16px; border: none; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: #0d0d0d; margin-bottom: 20px; transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s; box-shadow: 0 4px 20px rgba(245,200,66,0.3); }
  .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(245,200,66,0.45); }
  .spin-btn:active:not(:disabled) { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.35; cursor: not-allowed; background: #444; box-shadow: none; }
  .reset-btn { display: none; width: 100%; max-width: 700px; padding: 14px; font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; border-radius: 14px; border: 1px solid #3a3a3a; background: #1e1e1e; color: #f0f0f0; margin-bottom: 12px; transition: transform 0.15s, background 0.2s, border-color 0.2s; }
  .reset-btn:hover { background: #2a2a2a; border-color: var(--gold-dark); color: var(--gold); transform: translateY(-1px); }
  .reset-btn.show { display: block; }

  /* Card shuffle area */
  .shuffle-area { width: 100%; max-width: 700px; height: 120px; position: relative; margin-bottom: 20px; display: none; }
  .shuffle-area.active { display: block; }
  .card-item { position: absolute; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 1px solid var(--gold-dark); border-radius: 10px; width: 80px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--gold); text-align: center; padding: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: transform 0.15s ease, left 0.2s ease, top 0.2s ease; line-height: 1.3; }
  .card-item::before { content: '🎰'; display: block; font-size: 20px; margin-bottom: 4px; }

  /* Result Card */
  .result-card { background: var(--card); border: 1px solid var(--gold-dark); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 700px; margin-bottom: 20px; display: none; text-align: center; box-shadow: 0 0 40px rgba(245,200,66,0.15); }
  .result-card.show { display: block; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes popIn { 0% { transform: scale(0.7) rotate(-3deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
  .result-label { font-size: 11px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
  .result-name { font-size: 26px; font-weight: 900; color: #fff; line-height: 1.2; margin-bottom: 6px; }
  .result-company { font-size: 14px; color: var(--gold); font-weight: 600; opacity: 0.8; }
  .result-name.reveal { animation: reveal 0.5s ease; }
  @keyframes reveal { 0% { transform: rotateY(90deg); opacity: 0; } 100% { transform: rotateY(0deg); opacity: 1; } }
  .session-note { margin-top: 10px; font-size: 12px; color: var(--muted); }

  /* Particles */
  .particle { position: fixed; pointer-events: none; z-index: 999; width: 8px; height: 8px; border-radius: 50%; animation: particleFly 1s ease-out forwards; }
  @keyframes particleFly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } }

  /* History */
  .recent-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; width: 100%; max-width: 700px; display: none; }
  .recent-card.show { display: block; }
  .recent-title { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; font-weight: 600; }
  .recent-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text); font-weight: 600; }
  .recent-item:last-child { border-bottom: none; }
  .recent-num { width: 24px; height: 24px; border-radius: 50%; background: var(--card2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .recent-company { font-size: 11px; color: var(--gold); margin-right: auto; opacity: 0.7; }

  .bottom-note { margin-top: 16px; font-size: 12px; color: var(--muted); text-align: center; }
  @keyframes cardFlip { 0% { transform: rotateY(0deg) translateY(0px); } 25% { transform: rotateY(90deg) translateY(-20px); } 50% { transform: rotateY(180deg) translateY(0px); } 75% { transform: rotateY(270deg) translateY(-10px); } 100% { transform: rotateY(360deg) translateY(0px); } }
  .flipping { animation: cardFlip 0.4s ease infinite; }
</style>
</head>

  chip.innerHTML = `<span class="dot"></span><span class="chip-name" title="${co}">${co}</span><span class="chip-count">${companyMap[co] ? companyMap[co].length : 0}</span>`;

  const grid = document.getElementById('companies-grid');
  grid.innerHTML = '';

  const nonPinned = allCompanies.filter(c => !PINNED.includes(c));
  nonPinned.forEach(co => {
    if (fl && !co.toLowerCase().includes(fl)) return;
    makeChip(co, grid);
  });
  updateFilterSummary();
}

function toggleCompany(co, chip) {
  if (selectedCompanies.has(co)) {

    selectedCompanies.add(co);

  // Sync all chips with this company (pinned + regular)
  document.querySelectorAll(`.company-chip[data-company="${CSS.escape(co)}"]`).forEach(c => {

// ---- Audio ----
function playCardFlip() {
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(600, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.08);
  g.gain.setValueAtTime(0.15, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.08);
}
function playWhoosh() {
  const bufSize = ctx.sampleRate * 0.3, buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1)*(1-i/bufSize);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const filter = ctx.createBiquadFilter(); filter.type = 'bandpass';
  filter.frequency.setValueAtTime(2000, ctx.currentTime);
  filter.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.3);
  filter.Q.value = 1.5;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.4, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
  src.connect(filter); filter.connect(g); g.connect(ctx.destination);
  src.start(); src.stop(ctx.currentTime + 0.3);
}
function playWin() {
  [523,659,784,1047].forEach((freq,i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type = 'sine';
    const t = ctx.currentTime + i*0.12;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.3, t+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.35);
    o.start(t); o.stop(t+0.35);
  });
}

// ---- Cards Visual ----
function spawnCards(names) {
  const area = document.getElementById('shuffle-area');
  area.innerHTML = ''; area.classList.add('active');
  const count = Math.min(6, names.length);
  const areaW = Math.min(700, window.innerWidth - 32);
  for (let i = 0; i < count; i++) {
    const card = document.createElement('div');
    card.className = 'card-item flipping';
    card.textContent = names[i].name;
    card.style.left = (i*(areaW/count)) + 'px';
    card.style.top = Math.random()*20 + 'px';
    card.style.animationDelay = (i*0.07) + 's';
    card.style.zIndex = i;
    area.appendChild(card);
  }
}
function shuffleCards() {
  const area = document.getElementById('shuffle-area');
  const cards = area.querySelectorAll('.card-item');
  const areaW = Math.min(700, window.innerWidth - 32);
  cards.forEach(card => { card.style.left = Math.random()*(areaW-80) + 'px'; card.style.top = Math.random()*20 + 'px'; });
}
function hideCards() {
  const area = document.getElementById('shuffle-area');
  area.querySelectorAll('.card-item').forEach((card,i) => {
    setTimeout(() => { card.style.transition = 'transform 0.3s ease, opacity 0.3s ease'; card.style.transform = 'translateY(-150px) rotate(' + (Math.random()*40-20) + 'deg)'; card.style.opacity = '0'; }, i*50);

}

// ---- Particles ----
function spawnParticles(x, y) {
  const colors = ['#f5c842','#fff','#ff6b6b','#4ecdc4','#a8e063'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random()*Math.PI*2, dist = 80+Math.random()*120;
    p.style.cssText = `left:${x}px;top:${y}px;background:${colors[Math.floor(Math.random()*colors.length)]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

  const btn = document.getElementById('spin-btn');
  const resetBtn = document.getElementById('reset-btn');
  if (SLOTS_RAW.length === 0) { btn.disabled = true; btn.textContent = '⚠️ اختر شركة واحدة على الأقل!'; }
  else if (avail === 0) { btn.disabled = true; btn.textContent = '✅ تم عرض كل الألعاب!'; }
  else { btn.disabled = false; btn.textContent = '🎲 اختر سلوت عشوائي'; }
  resetBtn.classList.toggle('show', sessionUsed.size > 0);
}

function updateHistory() {
  const list = document.getElementById('recent-list');
  if (!history.length) { list.classList.remove('show'); return; }
  list.classList.add('show');
  document.getElementById('recent-items').innerHTML = history.slice(-5).reverse()
    .map((s,i) => `<div class="recent-item"><span class="recent-num">${i+1}</span>${s.name}<span class="recent-company">${s.company}</span></div>`).join('');
}

function spin() {
  if (ctx.state === 'suspended') ctx.resume();
  const btn = document.getElementById('spin-btn');
  btn.disabled = true;
  document.getElementById('result-card').classList.remove('show');
  const shuffled = [...SLOTS_RAW].sort(()=>Math.random()-0.5).slice(0,6);
  spawnCards(shuffled);
  playWhoosh();
  let flips = 0, totalFlips = 16;
  const interval = setInterval(() => {
    flips++;
    if (flips%3===0) { shuffleCards(); playCardFlip(); }
    if (flips >= totalFlips) {
      clearInterval(interval);
      const chosen = getRandom(SLOTS_RAW, sessionUsed);
      if (!chosen) { hideCards(); updateStats(); return; }
      hideCards();
      setTimeout(() => {
        const nameEl = document.getElementById('result-name');
        nameEl.textContent = chosen.name;
        nameEl.className = 'result-name reveal';
        document.getElementById('result-company').textContent = '🏢 ' + chosen.company;
        document.getElementById('result-card').classList.add('show');
        playWin();
        const rect = document.getElementById('result-card').getBoundingClientRect();
        spawnParticles(rect.left+rect.width/2, rect.top+rect.height/2);
        sessionUsed.add(chosen.name);
        history.push(chosen);
        updateStats();
        updateHistory();
      }, 400);
    }
  }, 120);
}

document.getElementById('spin-btn').addEventListener('click', spin);
document.getElementById('reset-btn').addEventListener('click', () => {
  sessionUsed.clear(); history.length = 0;
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('recent-list').classList.remove('show');
  document.getElementById('recent-items').innerHTML = '';
  updateStats();
});

// Init
rebuildSlots();
buildPinnedGrid();
buildCompaniesGrid();
document.getElementById('load-status').textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar');
document.getElementById('refresh-note').textContent = ALL_SLOTS.length + ' لعبة متاحة';
</script>
