<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختيار الاكس العشوائي - Stake</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c842;
    --gold-dark: #c9a020;
    --bg: #0d0d0d;
    --card: #161616;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #777;
    --green: #00e676;
    --red: #ff5252;
    --blue: #40c4ff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }


  /* === NAVBAR === */
  .navbar {
    width: 100vw; background: #111; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    padding: 0 16px; margin-bottom: 28px; position: sticky; top: 0; z-index: 50;
  }
  .navbar-inner {
    width: 100%; max-width: 700px;
    display: flex; align-items: center; gap: 6px;
    overflow-x: auto; padding: 10px 0;
  }
  .navbar-inner::-webkit-scrollbar { display: none; }
  .nav-home {
    font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--muted); text-decoration: none;
    padding: 7px 14px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent;
    white-space: nowrap; transition: color 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .nav-home:hover { color: var(--gold); border-color: var(--gold-dark); }
  .nav-sep { color: #333; font-size: 18px; flex-shrink: 0; padding: 0 2px; }
  .nav-link {
    font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--muted); text-decoration: none;
    padding: 7px 14px; border-radius: 10px;
    border: 1px solid transparent; white-space: nowrap;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .nav-link:hover { color: var(--gold); border-color: var(--border); background: var(--card); }
  .nav-link.active { color: var(--gold); background: rgba(245,200,66,0.08); border-color: rgba(245,200,66,0.2); }

  .page-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 500px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* Nav back */
  .nav-back {
    align-self: flex-start;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 13px; font-weight: 600;
    text-decoration: none; cursor: pointer;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    transition: color 0.2s, border-color 0.2s;
  }
  .nav-back:hover { color: var(--gold); border-color: var(--gold-dark); }

  .header { text-align: center; margin-bottom: 32px; }
  .header .logo { font-size: 12px; font-weight: 600; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
  .header h1 { font-size: 28px; font-weight: 900; color: #fff; }
  .header .sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

  /* Big display */
  .display-wrap {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 24px;
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .display-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(245,200,66,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Crash-style rising graph */
  .crash-graph {
    position: relative;
    width: 100%;
    height: 240px;
    margin-bottom: 14px;
    border-radius: 16px;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(245,200,66,0.04), transparent 60%);
    border: 1px solid rgba(245,200,66,0.08);
  }
  .crash-graph canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  .crash-rocket {
    position: absolute;
    font-size: 30px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 0 10px rgba(245,200,66,0.7));
    opacity: 0;
    z-index: 5;
    transition: opacity 0.15s;
  }
  .crash-rocket.show { opacity: 1; }
  .crash-graph.flash { animation: crashFlash 0.45s ease; }
  @keyframes crashFlash {
    0%   { background: rgba(255,82,82,0.4); }
    100% { background: linear-gradient(180deg, rgba(245,200,66,0.04), transparent 60%); }
  }

  .mult-label {
    font-size: 11px; color: var(--muted); letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 12px;
  }

  .mult-display {
    font-size: 80px; font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #f5c842, #fff 50%, #f5c842);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(245,200,66,0.4));
    transition: all 0.1s;
    min-height: 100px;
    display: flex; align-items: center; justify-content: center;
  }
  .mult-display.rolling {
    filter: drop-shadow(0 0 30px rgba(245,200,66,0.8));
  }
  .mult-display.low { background: linear-gradient(135deg, #ff5252, #ff8a80); -webkit-background-clip: text; background-clip: text; filter: drop-shadow(0 0 20px rgba(255,82,82,0.5)); }
  .mult-display.mid { background: linear-gradient(135deg, #f5c842, #ffe082); -webkit-background-clip: text; background-clip: text; filter: drop-shadow(0 0 20px rgba(245,200,66,0.6)); }
  .mult-display.high { background: linear-gradient(135deg, #00e676, #69f0ae); -webkit-background-clip: text; background-clip: text; filter: drop-shadow(0 0 30px rgba(0,230,118,0.7)); }
  .mult-display.epic { background: linear-gradient(135deg, #40c4ff, #e040fb, #f5c842); -webkit-background-clip: text; background-clip: text; filter: drop-shadow(0 0 40px rgba(224,64,251,0.8)); animation: epicGlow 0.5s infinite alternate; }
  @keyframes epicGlow {
    from { filter: drop-shadow(0 0 20px rgba(224,64,251,0.5)); }
    to { filter: drop-shadow(0 0 50px rgba(64,196,255,1)); }
  }

  .x-suffix { font-size: 36px; font-weight: 900; color: var(--gold); margin-right: 4px; vertical-align: super; }

  .result-tier {
    margin-top: 16px; font-size: 15px; font-weight: 700;
    min-height: 24px; letter-spacing: 1px;
    opacity: 0; transition: opacity 0.4s;
  }
  .result-tier.show { opacity: 1; }
  .tier-low { color: var(--red); }
  .tier-mid { color: var(--gold); }
  .tier-high { color: var(--green); }
  .tier-epic { color: #e040fb; }

  /* Gauge bar */
  .gauge-wrap {
    width: 100%; margin-top: 20px;
    background: #1a1a1a; border-radius: 999px;
    height: 8px; overflow: hidden;
  }
  .gauge-fill {
    height: 100%; border-radius: 999px;
    width: 0%;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: linear-gradient(90deg, var(--red), var(--gold), var(--green), #e040fb);
  }

  /* Spin button */
  .spin-btn {
    width: 100%; padding: 18px;
    font-family: 'Cairo', sans-serif; font-size: 20px; font-weight: 900;
    cursor: pointer; border-radius: 16px; border: none;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: #0d0d0d; margin-bottom: 20px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(245,200,66,0.35);
    letter-spacing: 1px;
  }
  .spin-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(245,200,66,0.5); }
  .spin-btn:active:not(:disabled) { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; background: #333; box-shadow: none; }

  /* Range selector */
  .range-wrap {
    width: 100%; background: var(--card);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 20px; margin-bottom: 20px;
  }
  .range-title { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
  .range-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .range-field label {
    display: block; font-size: 11px; color: var(--muted);
    margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase;
  }
  .range-field input {
    width: 100%; padding: 10px 14px;
    font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
    background: #1a1a1a; border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    outline: none; transition: border-color 0.2s;
    text-align: center;
  }
  .range-field input:focus { border-color: var(--gold); }
  .range-field input::-webkit-inner-spin-button,
  .range-field input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .range-error { font-size: 12px; color: var(--red); margin-top: 10px; min-height: 18px; text-align: center; }

  /* History */
  .history-wrap {
    width: 100%; background: var(--card);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 20px; display: none;
  }
  .history-wrap.show { display: block; }
  .history-title { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; font-weight: 600; }
  .history-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .history-chip {
    padding: 5px 12px; border-radius: 999px;
    font-size: 13px; font-weight: 700;
    border: 1px solid;
  }
  .chip-low { background: rgba(255,82,82,0.1); color: var(--red); border-color: rgba(255,82,82,0.3); }
  .chip-mid { background: rgba(245,200,66,0.1); color: var(--gold); border-color: rgba(245,200,66,0.3); }
  .chip-high { background: rgba(0,230,118,0.1); color: var(--green); border-color: rgba(0,230,118,0.3); }
  .chip-epic { background: rgba(224,64,251,0.1); color: #e040fb; border-color: rgba(224,64,251,0.3); }

  /* Particles */
  .particle {
    position: fixed; pointer-events: none; z-index: 999;
    border-radius: 50%;
    animation: fly 1.2s ease-out forwards;
  }
  @keyframes fly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
  }

  /* Rocket animation */
  .rocket {
    position: fixed; font-size: 32px; pointer-events: none; z-index: 998;
    animation: rocketLaunch 1.2s ease-out forwards;
  }
  @keyframes rocketLaunch {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-300px) scale(0.3); opacity: 0; }
  }
</style>

  <div class="navbar-inner">
    <a class="nav-home" href="index.html">🏠 الرئيسية</a>

    <a class="nav-link" href="slots.html">🎰 سلوت عشوائي</a>

<div class="page-wrap">

  <div class="header">
    <div class="logo">🚀 Stake Casino</div>
    <h1>اختيار الاكس العشوائي</h1>

  </div>

  <div class="display-wrap">
    <div class="crash-graph" id="crash-graph">
      <canvas id="crash-canvas"></canvas>
      <div class="crash-rocket" id="crash-rocket">🚀</div>
    </div>
    <div class="mult-label">المضاعف العشوائي</div>
    <div class="mult-display" id="mult-display">?</div>
    <div class="result-tier" id="result-tier"></div>
    <div class="gauge-wrap"><div class="gauge-fill" id="gauge-fill"></div></div>
  </div>

  <button class="spin-btn" id="spin-btn">🎲 اسحب الاكس</button>

  <div class="range-wrap">
    <div class="range-title">🎯 نطاق الاكس</div>
    <div class="range-inputs">
      <div class="range-field">
        <label>الحد الأدنى</label>
        <input type="number" id="input-min" value="10" min="1" placeholder="مثال: 10">
      </div>
      <div class="range-field">
        <label>الحد الأقصى</label>
        <input type="number" id="input-max" value="1000" min="2" placeholder="مثال: 1000">
      </div>
    </div>
    <div class="range-error" id="range-error"></div>
  </div>

  <div class="history-wrap" id="history-wrap">
    <div class="history-title">⏱ آخر النتائج</div>
    <div class="history-row" id="history-row"></div>
  </div>

</div>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();

let minVal = 10, maxVal = 1000;
let historyList = [];
let spinning = false;

// ---- Sound ----
function playTick(freq) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'sine';
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.12, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
  o.start(); o.stop(ctx.currentTime + 0.06);
}

function playWin(mult) {
  const isEpic = mult >= 501;
  const isHigh = mult >= 201;
  const notes = isEpic
    ? [523, 659, 784, 1047, 1319, 1568]
    : isHigh
    ? [523, 659, 784, 1047]
    : [392, 494, 587];

  notes.forEach((freq, i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = isEpic ? 'sawtooth' : 'sine';
    const t = ctx.currentTime + i * 0.1;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(isEpic ? 0.35 : 0.25, t + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    o.start(t); o.stop(t + 0.4);
  });

  // Extra bass for epic
  if (isEpic) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = 80;
    g.gain.setValueAtTime(0.5, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    o.start(); o.stop(ctx.currentTime + 0.6);
  }
}

function playRollSound(freq) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(freq * 0.5, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(freq, ctx.currentTime + 0.05);
  g.gain.setValueAtTime(0.08, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
  o.start(); o.stop(ctx.currentTime + 0.07);
}

function playCrash() {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(180, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(35, ctx.currentTime + 0.32);
  g.gain.setValueAtTime(0.32, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
  o.start(); o.stop(ctx.currentTime + 0.38);

  const o2 = ctx.createOscillator();
  const g2 = ctx.createGain();
  o2.connect(g2); g2.connect(ctx.destination);
  o2.type = 'square';
  o2.frequency.setValueAtTime(900, ctx.currentTime);
  o2.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.12);
  g2.gain.setValueAtTime(0.15, ctx.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  o2.start(); o2.stop(ctx.currentTime + 0.15);
}

// ---- Particles ----
function spawnParticles(x, y, count, isEpic) {
  const colors = isEpic
    ? ['#e040fb','#40c4ff','#f5c842','#fff','#00e676','#ff5252']
    : ['#f5c842','#fff','#00e676'];
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * (isEpic ? 200 : 120);
    const size = isEpic ? 6 + Math.random() * 8 : 4 + Math.random() * 6;
    p.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

function spawnRocket(x, y) {
  const r = document.createElement('div');
  r.className = 'rocket';
  r.textContent = '🚀';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 1200);
}

// ---- Tier ----
function getTier(val) {
  if (val >= 501) return { label: '👑 EXPERT — نادر جداً!', cls: 'tier-epic', dispCls: 'epic' };
  if (val >= 201) return { label: '🔥 HARD', cls: 'tier-high', dispCls: 'high' };
  if (val >= 51)  return { label: '💪 MEDIUM', cls: 'tier-mid', dispCls: 'mid' };
  return { label: '⭐ EASY', cls: 'tier-low', dispCls: 'low' };
}

function getChipClass(val) {
  if (val >= 501) return 'chip-epic';
  if (val >= 201) return 'chip-high';
  if (val >= 51)  return 'chip-mid';
  return 'chip-low';
}

// ---- History ----
function updateHistory() {
  const wrap = document.getElementById('history-wrap');
  if (historyList.length === 0) { wrap.classList.remove('show'); return; }
  wrap.classList.add('show');
  document.getElementById('history-row').innerHTML = historyList.slice(-10).reverse()
    .map(v => `<span class="history-chip ${getChipClass(v)}">${v}x</span>`).join('');
}

// ---- Spin (Crash-style) ----
function spin() {
  if (spinning) return;
  if (!validateRange()) return;
  if (ctx.state === 'suspended') ctx.resume();
  spinning = true;

  const btn = document.getElementById('spin-btn');
  const disp = document.getElementById('mult-display');
  const tier = document.getElementById('result-tier');
  const gauge = document.getElementById('gauge-fill');
  const graph = document.getElementById('crash-graph');
  const rocket = document.getElementById('crash-rocket');
  const canvas = document.getElementById('crash-canvas');
  const cctx = canvas.getContext('2d');

  btn.disabled = true;
  tier.className = 'result-tier';
  disp.className = 'mult-display rolling';
  gauge.style.width = '0%';
  rocket.textContent = '🚀';
  rocket.classList.add('show');

  // size canvas crisply for current box
  const rect = graph.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = rect.width, H = rect.height;
  cctx.clearRect(0, 0, W, H);

  const final = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
  const duration = Math.min(1300 + Math.log2(final + 1) * 380, 4200);
  const startTime = performance.now();
  const points = [];
  let lastTick = 0;

  // Where along the width the curve crashes — small multipliers pop early (left),
  // big multipliers travel further across the graph (toward the right edge)
  const padX = W * 0.05;
  const usableW = W - padX * 2;
  const logMin = Math.log(minVal + 1);
  const logMax = Math.log(maxVal + 1);
  const logFinalForX = Math.log(final + 1);
  let xFrac = logMax > logMin ? (logFinalForX - logMin) / (logMax - logMin) : 1;
  xFrac = Math.max(0.08, Math.min(1, xFrac));
  const xTarget = padX + xFrac * usableW;

  function frame(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // accelerating growth curve, like a crash multiplier climbing
    const value = 1 + (final - 1) * Math.pow(progress, 1.8);

    disp.textContent = value.toFixed(value < 10 ? 2 : (value < 100 ? 1 : 0)) + 'x';

    if (elapsed - lastTick > 65) {
      lastTick = elapsed;
      playRollSound(180 + progress * 520);
    }

    // log scale on Y so the curve stays visible even for huge multipliers
    const x = padX + progress * (xTarget - padX);
    const logFinal = Math.log(final + 1);
    const logVal = Math.log(value + 1);
    const y = H - (logVal / logFinal) * (H - 22) - 12;
    points.push({ x, y });

    cctx.clearRect(0, 0, W, H);
    if (points.length > 1) {
      // fill under the curve
      cctx.beginPath();
      cctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) cctx.lineTo(points[i].x, points[i].y);
      cctx.lineTo(points[points.length - 1].x, H);
      cctx.lineTo(points[0].x, H);
      cctx.closePath();
      const grad = cctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, 'rgba(245,200,66,0.32)');
      grad.addColorStop(1, 'rgba(245,200,66,0)');
      cctx.fillStyle = grad;
      cctx.fill();

      // the line itself
      cctx.beginPath();
      cctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) cctx.lineTo(points[i].x, points[i].y);
      cctx.strokeStyle = '#f5c842';
      cctx.lineWidth = 3;
      cctx.lineJoin = 'round';
      cctx.lineCap = 'round';
      cctx.shadowColor = 'rgba(245,200,66,0.75)';
      cctx.shadowBlur = 10;
      cctx.stroke();
      cctx.shadowBlur = 0;
    }

    // rocket follows the tip of the curve
    const last = points[points.length - 1];
    rocket.style.left = last.x + 'px';
    rocket.style.top = last.y + 'px';
    if (points.length > 3) {
      const prev = points[points.length - 4];
      const angle = Math.atan2(last.y - prev.y, last.x - prev.x) * 180 / Math.PI;
      rocket.style.transform = `translate(-50%,-50%) rotate(${angle + 45}deg)`;
    }

    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      // ===== CRASH =====
      disp.textContent = final + 'x';
      const t = getTier(final);
      disp.className = 'mult-display ' + t.dispCls;

      graph.classList.add('flash');
      setTimeout(() => graph.classList.remove('flash'), 450);
      playCrash();
      rocket.textContent = '💥';
      setTimeout(() => {
        rocket.classList.remove('show');
        rocket.textContent = '🚀';
      }, 500);

      const pct = ((final - minVal) / (maxVal - minVal)) * 100;
      gauge.style.width = pct + '%';

      setTimeout(() => {
        tier.textContent = t.label;
        tier.className = 'result-tier show ' + t.cls;
      }, 200);

      setTimeout(() => {
        playWin(final);
        const drect = disp.getBoundingClientRect();
        const cx = drect.left + drect.width / 2;
        const cy = drect.top + drect.height / 2;
        const isEpic = final >= 501;
        spawnParticles(cx, cy, isEpic ? 40 : 20, isEpic);
        if (isEpic) spawnRocket(cx, cy);
      }, 250);

      historyList.push(final);
      updateHistory();

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '🎲 اسحب مرة ثانية';
        spinning = false;
      }, 800);
    }
  }

  requestAnimationFrame(frame);
}

// ---- Range inputs ----
function validateRange() {
  const minInput = document.getElementById('input-min');
  const maxInput = document.getElementById('input-max');
  const errEl = document.getElementById('range-error');
  const newMin = parseInt(minInput.value);
  const newMax = parseInt(maxInput.value);

  if (isNaN(newMin) || isNaN(newMax)) {
    errEl.textContent = '⚠️ أدخل أرقاماً صحيحة';
    return false;
  }
  if (newMin < 1) {
    errEl.textContent = '⚠️ الحد الأدنى لازم يكون 1 على الأقل';
    return false;
  }
  if (newMax <= newMin) {
    errEl.textContent = '⚠️ الحد الأقصى لازم يكون أكبر من الأدنى';
    return false;
  }
  errEl.textContent = '';
  minVal = newMin;
  maxVal = newMax;
  return true;
}

document.getElementById('input-min').addEventListener('input', validateRange);
document.getElementById('input-max').addEventListener('input', validateRange);

document.getElementById('spin-btn').addEventListener('click', spin);
</script>
