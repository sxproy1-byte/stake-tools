<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دولاب الحظ - Stake</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c842;
    --gold-dark: #c9a020;
    --bg: #0d0d0d;
    --card: #161616;
    --card2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #777;
    --red: #ff5252;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
    overflow-x: hidden;
  }


  /* === NAVBAR === */
  .navbar {
    width: 100vw; background: #111; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    padding: 0 16px; margin-bottom: 28px; position: sticky; top: 0; z-index: 50;
  }
  .navbar-inner {
    width: 100%; max-width: 700px;
    display: flex; align-items: center; gap: 6px;
    overflow-x: auto; padding: 10px 0;
  }
  .navbar-inner::-webkit-scrollbar { display: none; }
  .nav-home {
    font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--muted); text-decoration: none;
    padding: 7px 14px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent;
    white-space: nowrap; transition: color 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .nav-home:hover { color: var(--gold); border-color: var(--gold-dark); }
  .nav-sep { color: #333; font-size: 18px; flex-shrink: 0; padding: 0 2px; }
  .nav-link {
    font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--muted); text-decoration: none;
    padding: 7px 14px; border-radius: 10px;
    border: 1px solid transparent; white-space: nowrap;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .nav-link:hover { color: var(--gold); border-color: var(--border); background: var(--card); }
  .nav-link.active { color: var(--gold); background: rgba(245,200,66,0.08); border-color: rgba(245,200,66,0.2); }

  /* nav */
  .nav-back {
    align-self: flex-start;
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 13px; font-weight: 600;
    text-decoration: none;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    transition: color 0.2s, border-color 0.2s;
    width: 100%; max-width: 520px;
  }
  .nav-back:hover { color: var(--gold); border-color: var(--gold-dark); }

  .header { text-align: center; margin-bottom: 20px; }
  .header .logo { font-size: 12px; font-weight: 600; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 4px; }
  .header h1 { font-size: 26px; font-weight: 900; color: #fff; }

  /* Wheel container */
  .wheel-section {
    width: 100%; max-width: 520px;
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 24px;
  }

  .wheel-wrap {
    position: relative;
    width: 300px; height: 300px;
    margin-bottom: 20px;
  }

  /* pointer arrow */
  .wheel-wrap::after {
    content: '';
    position: absolute;
    right: -18px;
    top: 50%;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 14px solid transparent;
    border-bottom: 14px solid transparent;
    border-right: 28px solid var(--gold);
    filter: drop-shadow(0 0 8px rgba(245,200,66,0.8));
    z-index: 10;
  }

  #wheel-canvas {
    width: 300px; height: 300px;
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(245,200,66,0.2), 0 0 80px rgba(0,0,0,0.6);
    cursor: pointer;
    transition: box-shadow 0.3s;
  }
  #wheel-canvas:hover { box-shadow: 0 0 50px rgba(245,200,66,0.4), 0 0 80px rgba(0,0,0,0.6); }
  #wheel-canvas.spinning { cursor: not-allowed; }

  .spin-btn {
    width: 100%; max-width: 300px; padding: 16px;
    font-family: 'Cairo', sans-serif; font-size: 18px; font-weight: 900;
    cursor: pointer; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: #0d0d0d;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    box-shadow: 0 4px 20px rgba(245,200,66,0.35);
    letter-spacing: 1px;
  }
  .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(245,200,66,0.5); }
  .spin-btn:active:not(:disabled) { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; background: #333; box-shadow: none; }

  /* empty state */
  .wheel-empty {
    width: 300px; height: 300px; border-radius: 50%;
    background: var(--card); border: 2px dashed var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px; gap: 8px; margin-bottom: 20px;
  }
  .wheel-empty span { font-size: 36px; }

  /* Result popup */
  .result-popup {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75);
    align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .result-popup.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .result-box {
    background: var(--card);
    border: 1px solid var(--gold-dark);
    border-radius: 24px;
    padding: 36px 28px;
    text-align: center;
    max-width: 320px; width: 90%;
    box-shadow: 0 0 60px rgba(245,200,66,0.2);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn { 0%{transform:scale(0.6);opacity:0} 100%{transform:scale(1);opacity:1} }

  .result-label { font-size: 11px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
  .result-name { font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 20px; line-height: 1.2; }

  .result-actions { display: flex; flex-direction: column; gap: 10px; }

  .btn-keep {
    padding: 12px; font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
    border-radius: 12px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #0d0d0d;
  }
  .btn-keep:hover { opacity: 0.9; }

  .btn-remove {
    padding: 12px; font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
    border-radius: 12px; border: 1px solid #ff525240; cursor: pointer;
    background: rgba(255,82,82,0.1); color: var(--red);
    transition: background 0.2s;
  }
  .btn-remove:hover { background: rgba(255,82,82,0.2); }

  .btn-close {
    padding: 10px; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600;
    border-radius: 10px; border: 1px solid var(--border); cursor: pointer;
    background: transparent; color: var(--muted);
    transition: color 0.2s;
  }
  .btn-close:hover { color: var(--text); }

  /* Add entry section */
  .add-section {
    width: 100%; max-width: 520px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 20px;
    margin-bottom: 20px;
  }
  .add-title { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; font-weight: 600; }



  .add-textarea {
    width: 100%; padding: 12px 14px;
    font-family: 'Cairo', sans-serif; font-size: 15px;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); outline: none;
    transition: border-color 0.2s;
    text-align: right; resize: vertical;
    min-height: 100px; line-height: 1.7;
    margin-bottom: 10px;
  }
  .add-textarea:focus { border-color: var(--gold-dark); }
  .add-textarea::placeholder { color: var(--muted); }

  .add-hint { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

  .add-btn {
    width: 100%; padding: 13px;
    font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700;
    border-radius: 12px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #0d0d0d;
    transition: opacity 0.2s, transform 0.15s;
  }
  .add-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  /* Entries list */
  .entries-section {
    width: 100%; max-width: 520px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 20px;
    margin-bottom: 20px; display: none;
  }
  .entries-section.show { display: block; }
  .entries-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .entries-title { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
  .clear-all-btn {
    font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--red); background: rgba(255,82,82,0.1);
    border: 1px solid rgba(255,82,82,0.3); border-radius: 8px;
    padding: 5px 12px; cursor: pointer;
    transition: background 0.2s;
  }
  .clear-all-btn:hover { background: rgba(255,82,82,0.2); }

  .entries-list { display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; }
  .entries-list::-webkit-scrollbar { width: 4px; }
  .entries-list::-webkit-scrollbar-track { background: transparent; }
  .entries-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .entry-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; font-weight: 600;
  }
  .entry-color {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }
  .entry-name { flex: 1; }
  .entry-del {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 16px; padding: 2px 6px;
    border-radius: 6px; transition: color 0.2s, background 0.2s;
    line-height: 1;
  }
  .entry-del:hover { color: var(--red); background: rgba(255,82,82,0.1); }

  /* History */
  .history-section {
    width: 100%; max-width: 520px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 20px;
    display: none;
  }
  .history-section.show { display: block; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .history-title { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
  .clear-hist-btn {
    font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--muted); background: var(--card2);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 12px; cursor: pointer;
    transition: color 0.2s;
  }
  .clear-hist-btn:hover { color: var(--text); }

  .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; }
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .history-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px;
  }
  .history-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--muted); flex-shrink: 0;
  }
  .history-name { flex: 1; font-weight: 600; }
  .history-tag {
    font-size: 11px; padding: 3px 8px; border-radius: 6px;
    font-weight: 700;
  }
  .tag-kept { background: rgba(245,200,66,0.1); color: var(--gold); }
  .tag-removed { background: rgba(255,82,82,0.1); color: var(--red); }

  /* Assign slots section */
  .assign-btn {
    display: none; width: 100%; max-width: 520px; padding: 15px;
    font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; border-radius: 14px; border: 1px solid rgba(245,200,66,0.4);
    background: rgba(245,200,66,0.08); color: var(--gold);
    margin-bottom: 20px;
    transition: background 0.2s, transform 0.15s;
  }
  .assign-btn.show { display: block; }
  .assign-btn:hover { background: rgba(245,200,66,0.15); transform: translateY(-1px); }

  .assign-section {
    width: 100%; max-width: 520px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 20px;
    margin-bottom: 20px; display: none;
  }
  .assign-section.show { display: block; }
  .assign-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .assign-title { font-size: 12px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
  .reshuffle-btn {
    font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--muted); background: var(--card2);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 12px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .reshuffle-btn:hover { color: var(--gold); border-color: var(--gold-dark); }

  .assign-list { display: flex; flex-direction: column; gap: 10px; }

  .assign-item {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    animation: slideIn 0.3s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .assign-item-wheel {
    font-size: 13px; color: var(--muted); margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .assign-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .assign-wheel-name { font-weight: 700; color: var(--text); }
  .assign-arrow { color: var(--gold); font-size: 14px; margin: 4px 0; }
  .assign-slot-name {
    font-size: 16px; font-weight: 900; color: var(--gold);
    line-height: 1.2;
  }


  /* Assign buttons row */
  .assign-btns-row {
    width: 100%; max-width: 520px;
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .assign-btn-all {
    flex: 1; padding: 14px 10px;
    font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; border-radius: 14px;
    border: 1px solid rgba(245,200,66,0.4);
    background: rgba(245,200,66,0.08); color: var(--gold);
    transition: background 0.2s, transform 0.15s;
  }
  .assign-btn-all:hover { background: rgba(245,200,66,0.15); transform: translateY(-1px); }

  .assign-btn-one {
    flex: 1; padding: 14px 10px;
    font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; border-radius: 14px;
    border: 1px solid rgba(64,196,255,0.4);
    background: rgba(64,196,255,0.07); color: #40c4ff;
    transition: background 0.2s, transform 0.15s;
  }
  .assign-btn-one:hover { background: rgba(64,196,255,0.14); transform: translateY(-1px); }

  /* One-by-one popup */
  .obo-popup {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.82);
    align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .obo-popup.show { display: flex; }

  .obo-box {
    background: var(--card);
    border: 1px solid var(--gold-dark);
    border-radius: 24px;
    padding: 32px 24px 24px;
    text-align: center;
    max-width: 340px; width: 92%;
    box-shadow: 0 0 60px rgba(245,200,66,0.18);
    animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  }

  .obo-progress {
    font-size: 11px; color: var(--muted); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .obo-person {
    font-size: 22px; font-weight: 900; color: #fff;
    margin-bottom: 6px;
  }
  .obo-arrow { color: var(--gold); font-size: 20px; margin: 10px 0; }
  .obo-slot {
    font-size: 24px; font-weight: 900; color: var(--gold);
    line-height: 1.3; margin-bottom: 24px;
    animation: reveal 0.5s ease;
  }
  @keyframes reveal {
    from { transform: rotateY(90deg); opacity: 0; }
    to   { transform: rotateY(0deg); opacity: 1; }
  }

  .obo-actions { display: flex; flex-direction: column; gap: 10px; }
  .obo-next {
    padding: 13px; font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
    border-radius: 12px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #0d0d0d; transition: opacity 0.2s;
  }
  .obo-next:hover { opacity: 0.9; }
  .obo-next:disabled { opacity: 0.35; cursor: not-allowed; }
  .obo-close {
    padding: 10px; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600;
    border-radius: 10px; border: 1px solid var(--border); cursor: pointer;
    background: transparent; color: var(--muted); transition: color 0.2s;
  }
  .obo-close:hover { color: var(--text); }

  /* Particles */
  .particle {
    position: fixed; pointer-events: none; z-index: 999;
    border-radius: 50%;
    animation: fly 1s ease-out forwards;
  }
  @keyframes fly {
    0%{transform:translate(0,0) scale(1);opacity:1}
    100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a class="nav-home" href="index.html">🏠 الرئيسية</a>
    <span class="nav-sep">|</span>
    <a class="nav-link" href="slots.html">🎰 سلوت عشوائي</a>
    <a class="nav-link" href="multiplier.html">🚀 الاكس العشوائي</a>
    <a class="nav-link active" href="wheel.html">🎡 دولاب الحظ</a>
  </div>
</nav>

<div class="header">
  <div class="logo">🎡 Stake Casino</div>
  <h1>دولاب الحظ</h1>
</div>

<!-- Wheel -->
<div class="wheel-section">
  <div class="wheel-wrap" id="wheel-wrap">
    <div class="wheel-empty" id="wheel-empty">
      <span>🎡</span>
      أضف خيارات للدولاب
    </div>
    <canvas id="wheel-canvas" width="300" height="300" style="display:none"></canvas>
  </div>
  <button class="spin-btn" id="spin-btn" disabled>🎲 دوّر</button>
</div>

<!-- Add entry -->
<div class="add-section">
  <div class="add-title">➕ أضف خيارات للدولاب</div>
  <div class="add-hint">كل سطر = خيار جديد، تقدر تحط أكثر من خيار سوا</div>
  <textarea class="add-textarea" id="add-input" placeholder="خيار 1&#10;خيار 2&#10;خيار 3&#10;..." rows="4"></textarea>
  <button class="add-btn" id="add-btn">➕ إضافة للدولاب</button>
</div>

<!-- Entries -->
<div class="entries-section" id="entries-section">
  <div class="entries-header">
    <div class="entries-title" id="entries-count">الخيارات (0)</div>
    <button class="clear-all-btn" id="clear-all-btn">مسح الكل</button>
  </div>
  <div class="entries-list" id="entries-list"></div>
</div>

<!-- History -->
<div class="history-section" id="history-section">
  <div class="history-header">
    <div class="history-title">⏱ سجل النتائج</div>
    <button class="clear-hist-btn" id="clear-hist-btn">مسح السجل</button>
  </div>
  <div class="history-list" id="history-list"></div>
</div>

<!-- Assign slots buttons -->
<div class="assign-btns-row" id="assign-btns-row" style="display:none">
  <button class="assign-btn-all" id="assign-btn">🎰 وزّع على الكل دفعة</button>
  <button class="assign-btn-one" id="assign-one-btn">👤 واحد واحد</button>
</div>

<!-- Assign section -->
<div class="assign-section" id="assign-section">
  <div class="assign-header">
    <div class="assign-title">🎰 السلوتات الموزعة</div>
    <button class="reshuffle-btn" id="reshuffle-btn">🔀 إعادة التوزيع</button>
  </div>
  <div class="assign-list" id="assign-list"></div>
</div>


<!-- One-by-one popup -->
<div class="obo-popup" id="obo-popup">
  <div class="obo-box">
    <div class="obo-progress" id="obo-progress">1 / 1</div>
    <div class="obo-person" id="obo-person">—</div>
    <div class="obo-arrow">↓</div>
    <div class="obo-slot" id="obo-slot">🎰 —</div>
    <div class="obo-actions">
      <button class="obo-next" id="obo-next">الشخص التالي ←</button>
      <button class="obo-close" id="obo-close">إغلاق</button>
    </div>
  </div>
</div>

<!-- Result popup -->
<div class="result-popup" id="result-popup">
  <div class="result-box">
    <div class="result-label">✦ النتيجة ✦</div>
    <div class="result-name" id="result-name">—</div>
    <div class="result-actions">

// ---- State ----
let entries = [];
let spinHistory = [];
let isSpinning = false;
let currentAngle = 0;
let lastResult = null;

const COLORS = [
  '#f5c842','#e8a020','#d4840a','#c06000','#e85020',
  '#c83040','#a02060','#803080','#6040a0','#4060c0',
  '#2080d0','#20a0b0','#20b080','#40b040','#80b020',
  '#b0a010','#d08010','#c05030','#a04050','#805070',
];

// ---- Audio ----
const ctx = new (window.AudioContext || window.webkitAudioContext)();
function playTick() {
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'triangle'; o.frequency.value = 600;
  g.gain.setValueAtTime(0.15, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
  o.start(); o.stop(ctx.currentTime + 0.05);
}
function playWin() {
  [523,659,784,1047].forEach((freq, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    const t = ctx.currentTime + i * 0.12;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.3, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    o.start(t); o.stop(t + 0.35);
  });
}

// ---- Particles ----
function spawnParticles(x, y) {
  const colors = ['#f5c842','#fff','#ff6b6b','#4ecdc4','#a8e063'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 140;
    const size = 5 + Math.random() * 7;
    p.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

// ---- Draw Wheel ----
function drawWheel(angle) {
  const canvas = document.getElementById('wheel-canvas');
  const c = canvas.getContext('2d');
  const cx = 150, cy = 150, r = 145;
  const n = entries.length;
  if (n === 0) return;

  c.clearRect(0, 0, 300, 300);
  const slice = (Math.PI * 2) / n;

  entries.forEach((entry, i) => {
    const start = angle + i * slice;
    const end = start + slice;

    // slice
    c.beginPath();
    c.moveTo(cx, cy);
    c.arc(cx, cy, r, start, end);
    c.closePath();
    c.fillStyle = COLORS[i % COLORS.length];
    c.fill();

    // border
    c.beginPath();
    c.moveTo(cx, cy);
    c.arc(cx, cy, r, start, end);
    c.closePath();
    c.strokeStyle = '#0d0d0d';
    c.lineWidth = 2;
    c.stroke();

    // text
    c.save();
    c.translate(cx, cy);
    c.rotate(start + slice / 2);
    c.textAlign = 'right';
    c.fillStyle = '#fff';
    c.font = `bold ${n > 10 ? 10 : 12}px Cairo`;
    c.shadowColor = 'rgba(0,0,0,0.8)';
    c.shadowBlur = 4;
    const maxLen = 14;
    const label = entry.name.length > maxLen ? entry.name.slice(0, maxLen) + '…' : entry.name;
    c.fillText(label, r - 10, 4);
    c.restore();
  });

  // center circle
  c.beginPath();
  c.arc(cx, cy, 22, 0, Math.PI * 2);
  c.fillStyle = '#0d0d0d';
  c.fill();
  c.strokeStyle = '#f5c842';
  c.lineWidth = 3;
  c.stroke();

  c.beginPath();
  c.arc(cx, cy, 10, 0, Math.PI * 2);
  c.fillStyle = '#f5c842';
  c.fill();
}

// ---- Spin ----
function spin() {
  if (isSpinning || entries.length === 0) return;
  if (ctx.state === 'suspended') ctx.resume();
  isSpinning = true;

  const btn = document.getElementById('spin-btn');
  const canvas = document.getElementById('wheel-canvas');
  btn.disabled = true;
  canvas.classList.add('spinning');

  const n = entries.length;
  const slice = (Math.PI * 2) / n;

  // random target: 5-10 full rotations + random stop
  const extraSpins = (5 + Math.random() * 5) * Math.PI * 2;
  const targetOffset = Math.random() * Math.PI * 2;
  const totalRotation = extraSpins + targetOffset;
  const duration = 4000 + Math.random() * 2000;
  const startTime = performance.now();
  const startAngle = currentAngle;

  let lastTick = 0;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);

    // ease out cubic
    const eased = 1 - Math.pow(1 - progress, 3);
    currentAngle = startAngle + totalRotation * eased;

    drawWheel(currentAngle);

    // tick sound
    const tickInterval = Math.max(50, 200 * (1 - eased * 0.8));
    if (now - lastTick > tickInterval) {
      playTick();
      lastTick = now;
    }

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      // Pointer is on the RIGHT at angle=0 (canvas coordinate system)
      // After rotation by currentAngle, the slice at the pointer is the one
      // whose start angle contains 0 (mod 2PI) when accounting for the rotation.
      const normalised = ((currentAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
      const adjusted = ((-normalised) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      const idx = Math.floor(adjusted / slice) % n;

      lastResult = entries[idx];
      isSpinning = false;
      canvas.classList.remove('spinning');
      btn.disabled = false;

      playWin();
      const rect = canvas.getBoundingClientRect();
      spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);

      setTimeout(() => showResult(lastResult), 300);
    }
  }

  requestAnimationFrame(animate);
}

// ---- Show result popup ----
function showResult(entry) {
  document.getElementById('result-name').textContent = entry.name;
  document.getElementById('result-popup').classList.add('show');
}

function hideResult() {
  document.getElementById('result-popup').classList.remove('show');
}

document.getElementById('btn-keep').addEventListener('click', () => {
  if (lastResult) {
    addHistory(lastResult, 'kept');
  }
  hideResult();
});

document.getElementById('btn-remove').addEventListener('click', () => {
  if (lastResult) {
    removeEntry(lastResult.name);
    addHistory(lastResult, 'removed');
  }
  hideResult();
});

document.getElementById('btn-close').addEventListener('click', hideResult);
document.getElementById('result-popup').addEventListener('click', (e) => {
  if (e.target === document.getElementById('result-popup')) hideResult();
});

// ---- Entries ----
function addEntry(name) {
  name = name.trim();
  if (!name) return;
  if (entries.find(e => e.name === name)) return;
  entries.push({ name });
  renderEntries();
  renderWheel();
}

function removeEntry(name) {
  entries = entries.filter(e => e.name !== name);
  renderEntries();
  renderWheel();
}

function renderEntries() {
  const list = document.getElementById('entries-list');
  const section = document.getElementById('entries-section');
  const count = document.getElementById('entries-count');
  const spinBtn = document.getElementById('spin-btn');

  count.textContent = `الخيارات (${entries.length})`;
  spinBtn.disabled = entries.length === 0;

  if (entries.length === 0) {
    section.classList.remove('show');
    return;
  }
  section.classList.add('show');

  list.innerHTML = entries.map((e, i) =>
    `<div class="entry-item">
      <div class="entry-color" style="background:${COLORS[i % COLORS.length]}"></div>
      <div class="entry-name">${e.name}</div>
      <button class="entry-del" onclick="removeEntry('${e.name.replace(/'/g, "\\'")}')">✕</button>
    </div>`
  ).join('');
}

function renderWheel() {
  const canvas = document.getElementById('wheel-canvas');
  const empty = document.getElementById('wheel-empty');
  if (entries.length === 0) {
    canvas.style.display = 'none';
    empty.style.display = 'flex';
  } else {
    canvas.style.display = 'block';
    empty.style.display = 'none';
    drawWheel(currentAngle);
  }
}

// ---- History ----
function addHistory(entry, action) {
  spinHistory.unshift({ name: entry.name, action, time: new Date().toLocaleTimeString('ar') });
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  const assignBtnsRow = document.getElementById('assign-btns-row');
  if (spinHistory.length === 0) {
    section.classList.remove('show');
    assignBtnsRow.style.display = 'none';
    return;
  }
  section.classList.add('show');
  assignBtnsRow.style.display = 'flex';
  list.innerHTML = spinHistory.slice(0, 20).map((h, i) =>
    `<div class="history-item">
      <div class="history-num">${i+1}</div>
      <div class="history-name">${h.name}</div>
      <div class="history-tag ${h.action === 'kept' ? 'tag-kept' : 'tag-removed'}">${h.action === 'kept' ? 'بقي' : 'حُذف'}</div>
    </div>`
  ).join('');
}

// ---- Assign slots ----
function assignSlots() {
  const names = [...new Set(spinHistory.map(h => h.name))];
  if (names.length === 0) return;

  // shuffle SLOTS_RAW and pick unique slots
  const shuffled = [...SLOTS_RAW].sort(() => Math.random() - 0.5);
  const picks = shuffled.slice(0, names.length);

  const section = document.getElementById('assign-section');
  const list = document.getElementById('assign-list');
  section.classList.add('show');

  list.innerHTML = names.map((name, i) => {
    const slot = picks[i] || { name: '—' };
    const color = COLORS[i % COLORS.length];
    return `<div class="assign-item" style="animation-delay:${i * 0.07}s">
      <div class="assign-item-wheel">
        <div class="assign-dot" style="background:${color}"></div>
        <span class="assign-wheel-name">${name}</span>
      </div>
      <div class="assign-arrow">↓</div>
      <div class="assign-slot-name">🎰 ${slot.name}</div>
    </div>`;
  }).join('');

  // scroll to section
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ---- Events ----
document.getElementById('add-btn').addEventListener('click', () => {
  const input = document.getElementById('add-input');
  const lines = input.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  lines.forEach(name => addEntry(name));
  input.value = '';
  input.focus();
});

document.getElementById('add-input').addEventListener('keydown', (e) => {
  // Ctrl+Enter or Cmd+Enter to submit
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    const input = document.getElementById('add-input');
    const lines = input.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    lines.forEach(name => addEntry(name));
    input.value = '';
  }
});

document.getElementById('spin-btn').addEventListener('click', spin);
document.getElementById('wheel-canvas').addEventListener('click', spin);

document.getElementById('clear-all-btn').addEventListener('click', () => {
  entries = [];

  renderWheel();
});

document.getElementById('clear-hist-btn').addEventListener('click', () => {
  spinHistory = [];
  renderHistory();
  document.getElementById('assign-section').classList.remove('show');
});

document.getElementById('assign-btn').addEventListener('click', assignSlots);
document.getElementById('reshuffle-btn').addEventListener('click', assignSlots);

// ---- One-by-one assign ----
let oboList = [];   // [{name, slot}]
let oboIndex = 0;

function startOneByOne() {
  const names = [...new Set(spinHistory.map(h => h.name))];
  if (names.length === 0) return;

  const shuffled = [...SLOTS_RAW].sort(() => Math.random() - 0.5);
  oboList = names.map((name, i) => ({ name, slot: (shuffled[i] || { name: '—' }).name }));
  oboIndex = 0;
  showOboStep();
  document.getElementById('obo-popup').classList.add('show');
}

function showOboStep() {
  const item = oboList[oboIndex];
  document.getElementById('obo-progress').textContent = (oboIndex + 1) + ' / ' + oboList.length;
  document.getElementById('obo-person').textContent = item.name;

  // animate slot reveal
  const slotEl = document.getElementById('obo-slot');
  slotEl.style.animation = 'none';
  slotEl.textContent = '🎰 ...';
  setTimeout(() => {
    slotEl.textContent = '🎰 ' + item.slot;
    slotEl.style.animation = 'reveal 0.5s ease';
  }, 150);

  // particles
  spawnParticles(window.innerWidth / 2, window.innerHeight / 2);
  playWin();

  const nextBtn = document.getElementById('obo-next');
  if (oboIndex >= oboList.length - 1) {
    nextBtn.textContent = '✅ انتهى الجميع';
    nextBtn.disabled = true;
  } else {
    nextBtn.textContent = 'الشخص التالي ←';
    nextBtn.disabled = false;
  }
}

document.getElementById('assign-one-btn').addEventListener('click', startOneByOne);
document.getElementById('obo-next').addEventListener('click', () => {
  if (oboIndex < oboList.length - 1) {
    oboIndex++;
    showOboStep();
  }
});
document.getElementById('obo-close').addEventListener('click', () => {
  document.getElementById('obo-popup').classList.remove('show');
});
document.getElementById('obo-popup').addEventListener('click', (e) => {
  if (e.target === document.getElementById('obo-popup'))
    document.getElementById('obo-popup').classList.remove('show');
});

// init
renderEntries();
